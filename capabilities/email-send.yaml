naftiko: 1.0.0-alpha2
info:
  label: Mailtrap Email Sending API — Send
  description: 'Mailtrap Email Sending API — Send. 2 operations. Lead operation: Send batch emails. Self-contained Naftiko
    capability covering one Mailtrap business surface.'
  tags:
  - Mailtrap
  - Send
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MAILTRAP_API_KEY: MAILTRAP_API_KEY
capability:
  consumes:
  - type: http
    namespace: email-send
    baseUri: https://send.api.mailtrap.io
    description: Mailtrap Email Sending API — Send business capability. Self-contained, no shared references.
    resources:
    - name: api-batch
      path: /api/batch
      operations:
      - name: sendbatchemails
        method: POST
        description: Send batch emails
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-send
      path: /api/send
      operations:
      - name: sendemail
        method: POST
        description: Send a transactional email
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.MAILTRAP_API_KEY}}'
  exposes:
  - type: rest
    namespace: email-send-rest
    port: 8080
    description: REST adapter for Mailtrap Email Sending API — Send. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/api/batch
      name: api-batch
      description: REST surface for api-batch.
      operations:
      - method: POST
        name: sendbatchemails
        description: Send batch emails
        call: email-send.sendbatchemails
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/send
      name: api-send
      description: REST surface for api-send.
      operations:
      - method: POST
        name: sendemail
        description: Send a transactional email
        call: email-send.sendemail
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: email-send-mcp
    port: 9090
    transport: http
    description: MCP adapter for Mailtrap Email Sending API — Send. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: send-batch-emails
      description: Send batch emails
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: email-send.sendbatchemails
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: send-transactional-email
      description: Send a transactional email
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: email-send.sendemail
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
