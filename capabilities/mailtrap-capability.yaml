naftiko: 1.0.0-alpha2
info:
  label: Mailtrap Email Sending API
  description: The Mailtrap Email Sending API allows sending transactional and bulk emails with high deliverability. It follows
    REST principles and supports authentication via API tokens, with all requests sent over HTTPS. The API exposes a JSON-based
    send endpoint and a batch endpoint capable of delivering up to 500 emails in a single request.
  tags:
  - Mailtrap
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: mailtrap
    baseUri: https://send.api.mailtrap.io
    description: Mailtrap Email Sending API HTTP API.
    authentication:
      type: bearer
      token: '{{MAILTRAP_TOKEN}}'
    resources:
    - name: api-send
      path: /api/send
      operations:
      - name: sendemail
        method: POST
        description: Send a transactional email
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: api-batch
      path: /api/batch
      operations:
      - name: sendbatchemails
        method: POST
        description: Send batch emails
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: mailtrap-rest
    description: REST adapter for Mailtrap Email Sending API.
    resources:
    - path: /api/send
      name: sendemail
      operations:
      - method: POST
        name: sendemail
        description: Send a transactional email
        call: mailtrap.sendemail
        outputParameters:
        - type: object
          mapping: $.
    - path: /api/batch
      name: sendbatchemails
      operations:
      - method: POST
        name: sendbatchemails
        description: Send batch emails
        call: mailtrap.sendbatchemails
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: mailtrap-mcp
    transport: http
    description: MCP adapter for Mailtrap Email Sending API for AI agent use.
    tools:
    - name: sendemail
      description: Send a transactional email
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: mailtrap.sendemail
      outputParameters:
      - type: object
        mapping: $.
    - name: sendbatchemails
      description: Send batch emails
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: mailtrap.sendbatchemails
      outputParameters:
      - type: object
        mapping: $.
binds:
- namespace: env
  keys:
    MAILTRAP_TOKEN: MAILTRAP_TOKEN
